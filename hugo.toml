baseURL = "https://ai-tools-hub.pages.dev/"
languageCode = "zh-cn"
defaultContentLanguage = "zh"
title = "AI工具社 - 发现最好用的AI工具"
theme = "PaperMod"
paginate = 20
enableRobotsTXT = true
buildDrafts = false
buildFuture = false
buildExpired = false

[params]
  env = "production"
  title = "AI工具社"
  description = "发现最好用的AI工具，提供详细的AI工具评测、使用教程和对比分析，帮你找到最适合的AI工具。"
  keywords = ["AI工具", "人工智能", "AI评测", "AI教程", "ChatGPT", "AI写作", "AI绘画", "AI编程"]
  author = "AI工具社"
  defaultTheme = "auto"
  ShowReadingTime = true
  ShowShareButtons = true
  ShowPostNavLinks = true
  ShowBreadCrumbs = true
  ShowCodeCopyButtons = true
  ShowWordCount = true
  ShowRssButtonInSectionTermList = true
  UseHugoToc = true
  disableSpecial1stPost = false
  disableScrollToTop = false
  hidemeta = false
  hideSummary = false
  showtoc = true
  tocopen = true

  [params.homeInfoParams]
    Title = "🤖 欢迎来到AI工具社"
    Content = "我们帮你发现最好用的AI工具。每个工具都有详细的评测、使用教程和对比分析，让你快速找到最适合的AI解决方案。"

  [[params.socialIcons]]
    name = "github"
    url = "https://github.com"

  [params.assets]
    favicon = "/favicon.ico"
    disableFingerprinting = true

  [params.cover]
    hidden = false
    hiddenInList = false
    hiddenInSingle = false

  [params.label]
    text = "AI工具社"

[outputs]
  home = ["HTML", "RSS", "JSON"]

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true
  [markup.highlight]
    codeFences = true
    guessSyntax = true
    lineNos = false
    style = "monokai"

[taxonomies]
  category = "categories"
  tag = "tags"
  series = "series"

[[menu.main]]
  identifier = "ai-writing"
  name = "✍️ AI写作"
  url = "/categories/ai写作/"
  weight = 10

[[menu.main]]
  identifier = "ai-image"
  name = "🎨 AI绘画"
  url = "/categories/ai绘画/"
  weight = 20

[[menu.main]]
  identifier = "ai-code"
  name = "💻 AI编程"
  url = "/categories/ai编程/"
  weight = 30

[[menu.main]]
  identifier = "ai-video"
  name = "🎬 AI视频"
  url = "/categories/ai视频/"
  weight = 40

[[menu.main]]
  identifier = "ai-office"
  name = "📊 AI办公"
  url = "/categories/ai办公/"
  weight = 50

[[menu.main]]
  identifier = "reviews"
  name = "⭐ 工具评测"
  url = "/categories/工具评测/"
  weight = 60

[[menu.main]]
  identifier = "tutorials"
  name = "📖 使用教程"
  url = "/categories/使用教程/"
  weight = 70

[[menu.main]]
  identifier = "about"
  name = "关于"
  url = "/about/"
  weight = 100

[services]
  [services.google_analytics]
    id = "G-XXXXXXXXXX"  # 替换为你的Google Analytics跟踪ID

[sitemap]
  changefreq = "weekly"
  filename = "sitemap.xml"
  priority = 0.5

[minify]
  disableXML = true
  minifyOutput = true
